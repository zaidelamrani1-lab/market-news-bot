name: Market News Bot

on:
  schedule:
    # Every 15 minutes. Keeps AI usage well within free limits.
    # Runs can be delayed a few minutes at busy times — normal for free jobs.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: market-news-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          # Optional overrides (uncomment in your repo if you change provider/model):
          # AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          # AI_MODEL: ${{ secrets.AI_MODEL }}
        run: python bot.py

      - name: Save which articles were processed
        run: |
          if [ -n "$(git status --porcelain seen.json)" ]; then
            git config user.name "market-news-bot"
            git config user.email "market-news-bot@users.noreply.github.com"
            git add seen.json
            git commit -m "Update seen articles [skip ci]"
            git push
          else
            echo "No changes to seen.json"
          fi
